{% extends "base.html" %}
{% block title %}Scan to ask — {{ room.title or "Q&A" }}{% endblock %}
{% block footer %}{% endblock %}
{% block body %}
<main style="background: var(--slate-900); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px; color: white; position: relative; overflow: hidden;">

  <!-- Coral glow behind QR -->
  <div aria-hidden="true" style="
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 480px; height: 480px; border-radius: 50%;
    background: radial-gradient(circle, rgba(246,91,102,0.15) 0%, transparent 65%);
    filter: blur(40px);
    pointer-events: none;"></div>

  <!-- AskUp wordmark at top -->
  <div id="qr-wordmark" style="
    font-size: 22px; font-weight: 700; letter-spacing: -0.4px;
    margin-bottom: 36px; opacity: 0; transform: translateY(-12px);
    transition: opacity 400ms ease, transform 400ms ease;">
    Ask<span style="color: var(--dlai-coral);">▲</span>Up
  </div>

  <!-- QR card -->
  <div id="qr-card" style="
    background: white; padding: 28px; border-radius: 20px;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 32px 80px rgba(0,0,0,0.5);
    opacity: 0; transform: scale(0.94);
    transition: opacity 360ms ease, transform 360ms cubic-bezier(0.32,0.72,0,1);">
    {{ qr_svg|safe }}
  </div>

  <!-- Scan subtitle — pulses -->
  <p id="qr-subtitle" style="
    margin: 28px 0 4px; color: var(--slate-400); font-size: 15px;
    letter-spacing: 0.2px; opacity: 0; transform: translateY(8px);
    transition: opacity 320ms ease, transform 320ms ease;
    animation: none;">
    Scan to join
  </p>

  <!-- Room code -->
  <div id="qr-code" style="
    font-family: var(--font-mono, 'DM Mono', monospace);
    font-size: 60px; font-weight: 700; letter-spacing: 10px;
    color: var(--dlai-coral); margin-top: 4px;
    opacity: 0; transform: translateY(8px);
    transition: opacity 320ms ease 80ms, transform 320ms ease 80ms;">
    {{ room.code }}
  </div>

  <p style="margin: 10px 0 0; color: var(--slate-500); font-size: 13px; opacity: 0; transition: opacity 320ms ease 160ms;" id="qr-url">
    or visit {{ audience_url }}
  </p>

  <!-- ESC button -->
  <button onclick="window.close() || history.back()"
          id="qr-esc-btn"
          aria-label="Close fullscreen"
          style="
            position: fixed; bottom: 28px; right: 28px;
            background: rgba(255,255,255,0.08);
            border: 1.5px solid rgba(255,255,255,0.14);
            color: rgba(255,255,255,0.65);
            font-size: 13px; font-weight: 600;
            padding: 8px 16px; border-radius: 10px;
            backdrop-filter: blur(8px);
            transition: background 160ms ease, color 160ms ease, transform 160ms ease, border-color 160ms ease;
            cursor: pointer;">
    esc
  </button>
</main>

<style>
@keyframes subtitle-pulse {
  0%, 100% { opacity: 0.55; }
  50%       { opacity: 1; }
}
.qr-subtitle-visible {
  animation: subtitle-pulse 2.4s ease-in-out infinite !important;
}
#qr-esc-btn:hover {
  background: rgba(255,255,255,0.14);
  color: rgba(255,255,255,0.9);
  border-color: rgba(255,255,255,0.28);
  transform: scale(1.04);
}
@media (prefers-reduced-motion: reduce) {
  .qr-subtitle-visible { animation: none !important; }
}
</style>

<script>
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') history.back(); });

// Entrance animations
window.addEventListener('load', function () {
  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function show(el, delay) {
    if (!el) return;
    setTimeout(() => {
      el.style.opacity = '1';
      el.style.transform = el.style.transform.replace(/scale\([^)]+\)/, 'scale(1)').replace('translateY(-12px)', 'translateY(0)').replace('translateY(8px)', 'translateY(0)');
    }, reduced ? 0 : delay);
  }

  show(document.getElementById('qr-wordmark'), 80);
  show(document.getElementById('qr-card'), 140);

  const subtitle = document.getElementById('qr-subtitle');
  const codeEl   = document.getElementById('qr-code');
  const urlEl    = document.getElementById('qr-url');

  setTimeout(() => {
    show(subtitle, 0);
    if (!reduced) setTimeout(() => subtitle.classList.add('qr-subtitle-visible'), 400);
    show(codeEl, 0);
    show(urlEl, 0);
  }, reduced ? 0 : 320);
});
</script>
{% endblock %}
