<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{% block title %}AskUp — Live Q&A{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/tokens.css?v=2">
  <link rel="stylesheet" href="/static/css/base.css?v=2">
  <link rel="stylesheet" href="/static/css/animations.css?v=2">
  <script src="https://unpkg.com/htmx.org@2.0.3" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/motion@10.18.0/dist/motion.min.js"></script>
  {% block head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
  {% block body %}{% endblock %}
  {% block footer %}
  <footer class="app-footer">
    <div>Made with <span class="heart">♥</span> from <a href="https://www.linkedin.com/in/gaurav-surtani/" target="_blank" rel="noopener noreferrer" class="author-link">Gaurav</a></div>
    <div class="links">
      <a href="https://github.com/gauravsurtani/qa-app" target="_blank" rel="noopener noreferrer">GitHub</a> · <a href="#">Privacy</a> · v0.1.0
    </div>
  </footer>
  {% endblock %}
</body>
</html>
